schema_version = 1

[[decision]]
gate = "L0"
disposition = "native-preview-inapplicable"
requirement = "The envelope has no thumbnail or display-mesh record. Fixed-card framing, document kind, and Global metadata are the complete native L0 content."

[[decision]]
gate = "L3"
disposition = "source-connectivity"
requirement = "Explicit B-rep records produce shared body-to-vertex topology. Face-local trimming records produce connected sheet regions without inferred cross-face adjacency."

[[decision]]
gate = "L4"
disposition = "inapplicable"
requirement = "The envelope has no ordered feature-operation history or replayable sketch history."

[[decision]]
gate = "L6"
disposition = "inapplicable"
requirement = "The envelope has no complete parametric constraint, expression, configuration, and re-derivable feature system."

[[decision]]
gate = "L7-mates"
disposition = "inapplicable"
requirement = "The envelope has product definitions and occurrences but no assembly-mate constraint model."
