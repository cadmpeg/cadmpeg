[[module]]
path = "crates/cadmpeg-codec-f3d/src/sab.rs"
status = "legacy"
legacy_reason = "SAB record framer. The subtype-scope `depth` handling in `payload_subtype_range` and `frame` is an iterative `i32`/`usize` counter inside a `while`/`loop` over the token stream, not stack recursion, so DepthGuard does not apply here (correcting the earlier characterization). The real graduation obligations are: thread a `View` through `frame`/`lex`/`payload_*` so the per-record leaf reads leave the `&[u8]` path, charge `work` per lexed token, and grow the unbounded `records`/`tokens`/`name_parts` accumulators through `grow_vec`. Blocked primarily by test coupling: `frame` and the `payload_*` helpers have 88 direct call sites in `tests.rs`, so changing their signatures to `View`/`DecodeContext` is a large edit that cannot land build-clean in a shared-worktree pass. `frame` returning records as `&[u8]` offsets is also the raw-byte egress that blocks `history.rs` graduation. High-risk unbounded-accumulation site; keystone for `history.rs`."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_sab_frame", "f3d_container"]
charges = []
cost_model = "target: work per lexed token; grow_vec over records/tokens/name_parts accumulators; no depth charge (iterative counter, not recursion)"
window_egress = []
ledger_level = 0

