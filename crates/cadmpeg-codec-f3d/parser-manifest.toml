# ---------------------------------------------------------------------------
# Leaf decoders still on the legacy free-function read path. Each consumes a
# `&[u8]` inflated-entry slice through `cadmpeg_ir::{read,le,be}` (themselves
# migrated primitive probes) but has not yet moved its count-framed loops to
# `exact_vec`/`read_counted`/`BoundedCount`, its recursion to `DepthGuard`, or
# its committed reads to the `req_*` mirror. They remain reachable and
# truncation-tested through the full-decode `f3d_container` fuzz target and the
# named leaf targets; they carry no module-level deny lint yet.

[[module]]
path = "crates/cadmpeg-codec-f3d/src/sab.rs"
status = "legacy"
legacy_reason = "SAB record framer with a nested marker-probe walk (9 depth-parameter sites). The recursion must move to ctx.descend()/DepthGuard and the per-record leaf reads to View + req_* mirrors before graduation; migrating framing without the depth guard would leave the highest-risk recursion site uncovered. High-risk recursion site, scheduled next."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_sab_frame", "f3d_container"]
charges = []
cost_model = "target: work per record marker examined and nodes+edges per framing walk; depth gauge via DepthGuard"
window_egress = []
ledger_level = 0

[[module]]
path = "crates/cadmpeg-codec-f3d/src/brep.rs"
status = "legacy"
legacy_reason = "Topology builder with count-framed loops over vertices/edges/coedges/faces and three Vec::with_capacity reservations sized from decoded counts. Counts need BoundedCount + exact_vec/read_counted before graduation. High-risk count site."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = []
cost_model = "target: alloc_bytes via exact_vec per topology count; work per record scanned"
window_egress = []
ledger_level = 0

[[module]]
path = "crates/cadmpeg-codec-f3d/src/nurbs.rs"
status = "legacy"
legacy_reason = "Cached spline-carrier decoder: the largest remaining surface (knot/control-point count loops, repeat_n-style knot expansion, per-cache recursion, 23 disallowed reservation calls). Requires BoundedCount for every knot/pole count, exact_vec/read_counted for the count-framed vectors, alloc_unfloored plus the existing codec-local caps for weight streams, and DepthGuard on the cache recursion. Highest-risk count/recursion site; largest migration unit."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_nurbs_curves", "f3d_nurbs_surfaces", "f3d_nurbs_pcurves", "f3d_container"]
charges = []
cost_model = "target: alloc_bytes via exact_vec/alloc_unfloored per knot and control-point count; work per candidate scan; depth via DepthGuard on cache recursion"
window_egress = []
ledger_level = 0

