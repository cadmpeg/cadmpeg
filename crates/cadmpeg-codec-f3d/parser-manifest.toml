[[module]]
path = "crates/cadmpeg-codec-f3d/src/asm_header.rs"
status = "legacy"
legacy_reason = "ASM B-rep header parser over fixed-width `&[u8]` fields via `cadmpeg_ir::{le,be}`. No untrusted count or recursion (lowest risk); every field read is already an `Option`-returning probe (`u32_at`/`u64_at`), so there is no committed req_* obligation. The real graduation obligation is charging work for the two full-window scans (`first_delta_state_offset` `windows` walk and the `read_string_region`/`record_stream_start` tag walk) through a threaded `View`. Blocked because `parse`/`record_stream_start`/`first_delta_state_offset`/`has_asm_magic` are called with `&[u8]` from the `writer.rs` encoder fixpoint suite, `brep::decode`, `container::scan`, and `decode.rs`; requiring a `DecodeContext`/`View` ripples into the encoder and dozens of tests, so it cannot graduate until those decode callers thread a `View`. Reachable and truncation-tested through the dedicated f3d_asm_header target."
