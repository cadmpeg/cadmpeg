# ---------------------------------------------------------------------------
# Leaf decoders still on the legacy free-function read path. Each consumes a
# `&[u8]` inflated-entry slice through `cadmpeg_ir::{read,le,be}` (themselves
# migrated primitive probes) but has not yet moved its count-framed loops to
# `exact_vec`/`read_counted`/`BoundedCount`, its recursion to `DepthGuard`, or
# its committed reads to the `req_*` mirror. They remain reachable and
# truncation-tested through the full-decode `f3d_container` fuzz target and the
# named leaf targets; they carry no module-level deny lint yet.

[[module]]
path = "crates/cadmpeg-codec-f3d/src/sab.rs"
status = "legacy"
legacy_reason = "SAB record framer. The subtype-scope `depth` handling in `payload_subtype_range` and `frame` is an iterative `i32`/`usize` counter inside a `while`/`loop` over the token stream, not stack recursion, so DepthGuard does not apply here (correcting the earlier characterization). The real graduation obligations are: thread a `View` through `frame`/`lex`/`payload_*` so the per-record leaf reads leave the `&[u8]` path, charge `work` per lexed token, and grow the unbounded `records`/`tokens`/`name_parts` accumulators through `grow_vec`. Blocked primarily by test coupling: `frame` and the `payload_*` helpers have 88 direct call sites in `tests.rs`, so changing their signatures to `View`/`DecodeContext` is a large edit that cannot land build-clean in a shared-worktree pass. `frame` returning records as `&[u8]` offsets is also the raw-byte egress that blocks `history.rs` graduation. High-risk unbounded-accumulation site; keystone for `history.rs`."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_sab_frame", "f3d_container"]
charges = []
cost_model = "target: work per lexed token; grow_vec over records/tokens/name_parts accumulators; no depth charge (iterative counter, not recursion)"
window_egress = []
ledger_level = 0

[[module]]
path = "crates/cadmpeg-codec-f3d/src/brep.rs"
status = "legacy"
legacy_reason = "Topology builder with count-framed loops over vertices/edges/coedges/faces and three Vec::with_capacity reservations sized from decoded counts. Counts need BoundedCount + exact_vec/read_counted before graduation. High-risk count site."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = []
cost_model = "target: alloc_bytes via exact_vec per topology count; work per record scanned"
window_egress = []
ledger_level = 0

[[module]]
path = "crates/cadmpeg-codec-f3d/src/nurbs.rs"
status = "legacy"
legacy_reason = "Cached spline-carrier decoder: the largest remaining surface (knot/control-point count loops, repeat_n-style knot expansion, per-cache recursion, 23 disallowed reservation calls). Requires BoundedCount for every knot/pole count, exact_vec/read_counted for the count-framed vectors, alloc_unfloored plus the existing codec-local caps for weight streams, and DepthGuard on the cache recursion. Highest-risk count/recursion site; largest migration unit."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_nurbs_curves", "f3d_nurbs_surfaces", "f3d_nurbs_pcurves", "f3d_container"]
charges = []
cost_model = "target: alloc_bytes via exact_vec/alloc_unfloored per knot and control-point count; work per candidate scan; depth via DepthGuard on cache recursion"
window_egress = []
ledger_level = 0

[[module]]
path = "crates/cadmpeg-codec-f3d/src/design.rs"
status = "legacy"
legacy_reason = "Design-record decoder. The one high-risk unfloored-count site, `decode_body_members`, is now MIGRATED: it reads through the entry `View` (`entry_view`, `seek_rel`), reserves the `BodiesRoot` member list through `View::counted(count, 11)` + `DecodeContext::exact_vec` (physical-floor proof over the 11-byte record stride), grows the cross-entry accumulator through `grow_vec`, and charges `work` for the prefix scan (once per window) and per member record; the `ctx` is threaded from the two `decode.rs` call sites (no direct `tests.rs` sites). It is truncation-tested at its record boundaries by `truncation_at_design_body_member_boundaries_is_deterministic_and_never_panics`, which also asserts deterministic output across cuts. The module now holds NO disallowed-method reservation at all: the four `parse_sketch_relation` member/return `Vec::with_capacity(count)` calls (domain-capped at 64) were converted to `Vec::new` + `push` because the record stride there is variable (`marked_u32` + `next_reference_marker`), so no fixed physical floor justifies an `exact_vec` reservation and the 64-cap already bounds the worst case. The module stays legacy for the remaining checklist gap only: the ~14 public reader functions still read `scan.entry_bytes` `&[u8]` via `cadmpeg_ir::le` rather than a threaded `View`, and their committed reads are not yet mirrored through `req_*`. Graduation with the module-level deny lint requires threading a `View` through those readers and adding the `req_*` mirrors; the deny lint itself would already pass clean (no disallowed methods remain), but marking `migrated` while the hostile reads stay on the raw `&[u8]` path would violate the migrated-means checklist. Lowest-risk legacy leaf: no unbounded and no floored reservation remains."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = []
cost_model = "target: alloc_bytes via exact_vec under View::counted(count, min_element_size) per record count (11 bytes for body members) plus a per-member alloc_bytes charge for the `format!` id String heap (which exact_vec's inline element charge does not cover); work per record scanned"
window_egress = []
ledger_level = 0

[[module]]
path = "crates/cadmpeg-codec-f3d/src/materials.rs"
status = "legacy"
legacy_reason = "Appearance/material record decoder, partially View-aware but still holding 8 disallowed reservation calls and count-framed property loops off the req_* mirror. Needs exact_vec/BoundedCount and req_* on the committed reads before graduation."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = []
cost_model = "target: alloc_bytes via exact_vec per property/binding count; work per record scanned"
window_egress = []
ledger_level = 0

[[module]]
path = "crates/cadmpeg-codec-f3d/src/history.rs"
status = "legacy"
legacy_reason = "Construction-history walk over inflated `.smb`/`.smbh` history slices via legacy `&[u8]` reads. Committed reads must move to the req_* mirror and the delta-state/bulletin-board walk charge work before graduation. Additionally blocked on `sab.rs`: `decode_history_records` calls `sab::frame`, which returns records as `&[u8]` offsets, and history then egresses raw bytes via `bytes[record.offset..record.offset + record.len].to_vec()` (per-record `raw_bytes`) and `bytes[start..limit].to_vec()` (the `opaque_history_payload` fallback). Those raw-byte egress sites must be eliminated or recorded in `window_egress` when it graduates, which requires `sab::frame` to hand back `View`s first. Lower risk (no unbounded reservation) but not yet migrated."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = []
cost_model = "target: work per delta-state record examined"
window_egress = []
ledger_level = 0

# ---------------------------------------------------------------------------
# Migrated leaf decoder. `act.rs` graduated ahead of the count-framed topology
# leaves: it is the smallest self-contained marker-probe module (single caller,
# no cross-module coupling to the still-legacy `brep`/`nurbs` graph), so it
# migrates in isolation without threading a `View` through the legacy leaves.
# It carries `#![deny(clippy::disallowed_methods)]`; the surrounding legacy
# leaves below do not yet.
[[module]]
path = "crates/cadmpeg-codec-f3d/src/act.rs"
status = "migrated"
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = ["alloc_bytes", "work"]
cost_model = "work charged in two parts: (1) once per stream pass in each of the three whole-stream scans for the position-stepping cost, proportional to `win_len` (doubled for `decode_table` to cover the ACTTable marker search and the trailing GUID scan); (2) inside each `lp_ascii`/`lp_utf16` probe, `4 + payload_bytes` charged before the probe reads and allocates, so a scan that runs the probe at every position charges CPU proportional to the bytes each probe actually examines rather than a flat unit per position; alloc_bytes charged via exact_vec over the ACTTable count under a BoundedCount physical-floor proof, via grow_vec for the entity/guid/root-component accumulators, and via charge_alloc per merged `by_key` graph node (untrusted-count-tracked map growth)"
window_egress = []
ledger_level = 0
# Migrated per doc section 10 Phase 2: hostile reads go through `View` at
# entry-relative offsets (`seek_rel`), the count-framed `ACTTable` loop reserves
# through `exact_vec` under `View::counted`, accumulators use `grow_vec`, and
# every marker scan charges work per byte examined. Reached and truncation-
# tested through `f3d_container` plus the dedicated
# `truncation_at_act_record_boundaries_is_deterministic_and_never_panics` test,
# which also asserts deterministic output across cuts. No `req_*` obligation:
# every ACT read is an optional marker probe (`Option`), never a committed
# required read, so classification stays pre-commit `NoMatch` per section 3.3.
# Module carries `#![deny(clippy::disallowed_methods)]`; the domain caps
# (`MAX_TABLE_ENTRIES`, 1024-unit UTF-16, 128-byte ASCII, 8-channel groups)
# stay as format facts and defense in depth alongside the budget.

# ---------------------------------------------------------------------------
# Remaining legacy leaf. `asm_header.rs` reads through `View` at its callers'
# boundary only after the still-legacy `brep`/`container` slices migrate; it is
# entangled with them (called from `brep::decode` and `container::scan` over
# `&[u8]`), so it does not carry the deny lint yet.
[[module]]
path = "crates/cadmpeg-codec-f3d/src/asm_header.rs"
status = "legacy"
legacy_reason = "ASM B-rep header parser over fixed-width `&[u8]` fields via `cadmpeg_ir::{le,be}`. No untrusted count or recursion (lowest risk); every field read is already an `Option`-returning probe (`u32_at`/`u64_at`), so there is no committed req_* obligation. The real graduation obligation is charging work for the two full-window scans (`first_delta_state_offset` `windows` walk and the `read_string_region`/`record_stream_start` tag walk) through a threaded `View`. Blocked because `parse`/`record_stream_start`/`first_delta_state_offset`/`has_asm_magic` are called with `&[u8]` from the `writer.rs` encoder fixpoint suite, `brep::decode`, `container::scan`, and `decode.rs`; requiring a `DecodeContext`/`View` ripples into the encoder and dozens of tests, so it cannot graduate until those decode callers thread a `View`. Reachable and truncation-tested through the dedicated f3d_asm_header target."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_asm_header", "f3d_container"]
charges = []
cost_model = "target: fixed-width committed reads via req_* mirror; no count or scan charge"
window_egress = []
ledger_level = 0

