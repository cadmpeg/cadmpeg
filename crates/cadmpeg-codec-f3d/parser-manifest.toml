[[module]]
path = "crates/cadmpeg-codec-f3d/src/design.rs"
status = "legacy"
legacy_reason = "Design-record decoder. The one high-risk unfloored-count site, `decode_body_members`, is now MIGRATED: it reads through the entry `View` (`entry_view`, `seek_rel`), reserves the `BodiesRoot` member list through `View::counted(count, 11)` + `DecodeContext::exact_vec` (physical-floor proof over the 11-byte record stride), grows the cross-entry accumulator through `grow_vec`, and charges `work` for the prefix scan (once per window) and per member record; the `ctx` is threaded from the two `decode.rs` call sites (no direct `tests.rs` sites). It is truncation-tested at its record boundaries by `truncation_at_design_body_member_boundaries_is_deterministic_and_never_panics`, which also asserts deterministic output across cuts. The module now holds NO disallowed-method reservation at all: the four `parse_sketch_relation` member/return `Vec::with_capacity(count)` calls (domain-capped at 64) were converted to `Vec::new` + `push` because the record stride there is variable (`marked_u32` + `next_reference_marker`), so no fixed physical floor justifies an `exact_vec` reservation and the 64-cap already bounds the worst case. The module stays legacy for the remaining checklist gap only: the ~14 public reader functions still read `scan.entry_bytes` `&[u8]` via `cadmpeg_ir::le` rather than a threaded `View`, and their committed reads are not yet mirrored through `req_*`. Graduation with the module-level deny lint requires threading a `View` through those readers and adding the `req_*` mirrors; the deny lint itself would already pass clean (no disallowed methods remain), but marking `migrated` while the hostile reads stay on the raw `&[u8]` path would violate the migrated-means checklist. Lowest-risk legacy leaf: no unbounded and no floored reservation remains."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = []
cost_model = "target: alloc_bytes via exact_vec under View::counted(count, min_element_size) per record count (11 bytes for body members) plus a per-member alloc_bytes charge for the `format!` id String heap (which exact_vec's inline element charge does not cover); work per record scanned"
window_egress = []
ledger_level = 0

