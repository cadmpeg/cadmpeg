[[module]]
path = "crates/cadmpeg-codec-f3d/src/history.rs"
status = "legacy"
legacy_reason = "Construction-history walk over inflated `.smb`/`.smbh` history slices via legacy `&[u8]` reads. Committed reads must move to the req_* mirror and the delta-state/bulletin-board walk charge work before graduation. Additionally blocked on `sab.rs`: `decode_history_records` calls `sab::frame`, which returns records as `&[u8]` offsets, and history then egresses raw bytes via `bytes[record.offset..record.offset + record.len].to_vec()` (per-record `raw_bytes`) and `bytes[start..limit].to_vec()` (the `opaque_history_payload` fallback). Those raw-byte egress sites must be eliminated or recorded in `window_egress` when it graduates, which requires `sab::frame` to hand back `View`s first. Lower risk (no unbounded reservation) but not yet migrated."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = []
cost_model = "target: work per delta-state record examined"
window_egress = []
ledger_level = 0

# ---------------------------------------------------------------------------
# Migrated leaf decoder. `act.rs` graduated ahead of the count-framed topology
# leaves: it is the smallest self-contained marker-probe module (single caller,
# no cross-module coupling to the still-legacy `brep`/`nurbs` graph), so it
# migrates in isolation without threading a `View` through the legacy leaves.
# It carries `#![deny(clippy::disallowed_methods)]`; the surrounding legacy
# leaves below do not yet.
[[module]]
path = "crates/cadmpeg-codec-f3d/src/act.rs"
status = "migrated"
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_container"]
charges = ["alloc_bytes", "work"]
cost_model = "work charged in two parts: (1) once per stream pass in each of the three whole-stream scans for the position-stepping cost, proportional to `win_len` (doubled for `decode_table` to cover the ACTTable marker search and the trailing GUID scan); (2) inside each `lp_ascii`/`lp_utf16` probe, `4 + payload_bytes` charged before the probe reads and allocates, so a scan that runs the probe at every position charges CPU proportional to the bytes each probe actually examines rather than a flat unit per position; alloc_bytes charged via exact_vec over the ACTTable count under a BoundedCount physical-floor proof, via grow_vec for the entity/guid/root-component accumulators, and via charge_alloc per merged `by_key` graph node (untrusted-count-tracked map growth)"
window_egress = []
ledger_level = 0
# Migrated per doc section 10 Phase 2: hostile reads go through `View` at
# entry-relative offsets (`seek_rel`), the count-framed `ACTTable` loop reserves
# through `exact_vec` under `View::counted`, accumulators use `grow_vec`, and
# every marker scan charges work per byte examined. Reached and truncation-
# tested through `f3d_container` plus the dedicated
# `truncation_at_act_record_boundaries_is_deterministic_and_never_panics` test,
# which also asserts deterministic output across cuts. No `req_*` obligation:
# every ACT read is an optional marker probe (`Option`), never a committed
# required read, so classification stays pre-commit `NoMatch` per section 3.3.
# Module carries `#![deny(clippy::disallowed_methods)]`; the domain caps
# (`MAX_TABLE_ENTRIES`, 1024-unit UTF-16, 128-byte ASCII, 8-channel groups)
# stay as format facts and defense in depth alongside the budget.

# ---------------------------------------------------------------------------
# Remaining legacy leaf. `asm_header.rs` reads through `View` at its callers'
# boundary only after the still-legacy `brep`/`container` slices migrate; it is
# entangled with them (called from `brep::decode` and `container::scan` over
# `&[u8]`), so it does not carry the deny lint yet.
[[module]]
path = "crates/cadmpeg-codec-f3d/src/asm_header.rs"
status = "legacy"
legacy_reason = "ASM B-rep header parser over fixed-width `&[u8]` fields via `cadmpeg_ir::{le,be}`. No untrusted count or recursion (lowest risk); every field read is already an `Option`-returning probe (`u32_at`/`u64_at`), so there is no committed req_* obligation. The real graduation obligation is charging work for the two full-window scans (`first_delta_state_offset` `windows` walk and the `read_string_region`/`record_stream_start` tag walk) through a threaded `View`. Blocked because `parse`/`record_stream_start`/`first_delta_state_offset`/`has_asm_magic` are called with `&[u8]` from the `writer.rs` encoder fixpoint suite, `brep::decode`, `container::scan`, and `decode.rs`; requiring a `DecodeContext`/`View` ripples into the encoder and dozens of tests, so it cannot graduate until those decode callers thread a `View`. Reachable and truncation-tested through the dedicated f3d_asm_header target."
input_spaces = ["entry:*"]
fuzz_targets = ["f3d_asm_header", "f3d_container"]
charges = []
cost_model = "target: fixed-width committed reads via req_* mirror; no count or scan charge"
window_egress = []
ledger_level = 0
