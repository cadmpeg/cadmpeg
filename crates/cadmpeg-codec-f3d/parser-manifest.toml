# SPDX-License-Identifier: Apache-2.0
#
# Per-module migration manifest for `cadmpeg-codec-f3d` (doc section 8.6 /
# 10 Phase 2). One `[[module]]` entry per source module that reads or shapes
# untrusted `.f3d` bytes. `status` is `migrated` or `legacy`; a `legacy`
# module records why it has not graduated in `legacy_reason`. `charges` names
# the budget dimensions the module drives; `cost_model` states the charge
# shape (never a flat unit per iteration). `window_egress` lists the audited
# `View::window()` raw-byte egress sites the module keeps, cross-referenced by
# the section 8.8 ratchet. `ledger_level` is the section 6.1 record-accounting
# level (0 everywhere: f3d is L1-ready but does not serialize a ledger until
# Phase 3).
#
# Ordering follows doc section 10 Phase 2: count-framed / container framing
# first, then the pure record model, then the irregular marker probes and
# graph traversals still awaiting leaf migration.

# ---------------------------------------------------------------------------
# Container framing and pipeline orchestration. Migrated in Phase 1 to consume
# the session root `View`, route inflation through `begin_expand`, and charge
# alloc/work before touching an untrusted entry count. Graduated here with
# module-level `#[deny(clippy::disallowed_methods)]`; the one bounded entry
# accumulator was converted to the `Vec::new` + `push` migrated spelling.
[[module]]
path = "crates/cadmpeg-codec-f3d/src/container.rs"
status = "migrated"
input_spaces = ["source", "entry:*"]
fuzz_targets = ["f3d_container"]
charges = ["alloc_bytes", "work", "decompressed_bytes"]
cost_model = "alloc_bytes = PER_ENTRY_GRAPH_BYTES per central-directory entry charged before reservation; decompressed_bytes charged per ExpandWriter::write over each inflated entry; work charged per entry classification scan"
window_egress = [
    "scan: source-image slice for the container SHA-256 digest",
    "admit_entry buffer: inflated entry bytes handed to the legacy sab/brep/design/materials leaf parsers pending their Phase-2 View migration",
]
ledger_level = 0

[[module]]
path = "crates/cadmpeg-codec-f3d/src/decode.rs"
status = "migrated"
input_spaces = ["source"]
fuzz_targets = ["f3d_container"]
charges = []
cost_model = "orchestration only: navigates the root View and dispatches to container/sab/brep; all hostile-byte charging is delegated to the modules it calls (container charges alloc/work/decompressed at the framing boundary)"
window_egress = []
ledger_level = 0

