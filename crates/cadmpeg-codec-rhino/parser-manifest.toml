# Mesh tessellation channels and compressed buffers. Vertex/face/channel loops
# are count-framed; compression already routes through the platform expand path.
[[module]]
path = "crates/cadmpeg-codec-rhino/src/mesh.rs"
status = "legacy"
reason = "Decompression is migrated — every compressed buffer inflates through `DecodeContext::begin_expand` and charges `decompressed_bytes` — and the highest-amplification allocation, the `read_faces` triangle accumulator, now reserves through `ctx.alloc_unfloored` behind the codec-local `MAX_MESH_FACES` cap, charging `alloc_bytes` against the caller's document budget. No `Vec::with_capacity`/`reserve`/`resize`/`repeat_n` remains in the module: the raw channel readers (`read_counted_raw`) size their output with `reader.take(bytes)?.to_vec()`, bounded by the reader's remaining input rather than by a decoded count, and the channel/warning lists accumulate with `Vec::new` + `push` (lint-invisible by design, §8). The module stays legacy for the second migrated-means obligation, not the allocation one: every field and channel read runs through the crate-local `BoundedReader`/`MeshExpand::data` over `&[u8]` rather than the `View`/`req_*` mirror, and the `read_counted_raw`/`read_ngons` byte reservations are not yet charged against `alloc_bytes` through the threaded `ctx`, so the module cannot carry the deny lint. `View::window()` is retained only to hand compressed input to `inflate` and to compute chunk digests."
input_spaces = ["rhino_object_record", "rhino_mesh_expand"]
fuzz_targets = ["rhino_mesh_buffer", "rhino_object_record"]
charges = ["alloc_bytes", "work", "decompressed_bytes"]
cost_model = "decompressed_bytes charged per ExpandWriter::write; target alloc_bytes per reserved vertex/face via exact_vec; work per channel element"
window_egress = [
  "mesh.rs:MeshExpand::data — root window handed to the buffer reader",
  "mesh.rs:read_buffer — source.window() as decompressor / stored-copy input",
  "mesh.rs:read_buffer — view.window() for the stored (uncompressed) branch",
  "mesh.rs:inflate — source.window() as zlib input",
  "mesh.rs:chunk checksum — window() for CRC digest",
]
ledger_level = 0

