# Cage / morph control lattice. Count-framed point lattice, now migrated.
# Reads the record body through a `View` on the caller's threaded platform
# `DecodeContext` (routed via `MeshExpand`): knot
# vectors and the control net are sized by `View::counted` proofs and reserved
# through `ctx.exact_vec`; derived weights (no input floor) use
# `alloc_unfloored` under the `MAX_CONTROL_POINTS` codec-local cap; committed
# scalars use the `req_*` mirror; per-element `work` is charged; the module
# carries `deny(clippy::disallowed_methods)`. Truncation at the control-net
# boundary is tested. Residual raw-byte egress: the body is obtained as the raw
# `&[u8]` file slice via `MeshExpand::data()` (which is `MeshExpand::root.window()`
# in mesh.rs) and `chunk_at` locates the record body on that slice before the
# `View` takes over. That whole-file `&[u8]` handoff is a real raw-byte egress
# boundary and is named in `window_egress` below; the underlying `.window()`
# call site lives in mesh.rs and is counted there by the source ratchet.
[[module]]
path = "crates/cadmpeg-codec-rhino/src/cage.rs"
status = "migrated"
input_spaces = ["rhino_object_record"]
fuzz_targets = ["rhino_cage", "rhino_object_record"]
charges = ["alloc_bytes", "work"]
cost_model = "alloc_bytes per reserved knot/control element via exact_vec (weights via alloc_unfloored under MAX_CONTROL_POINTS); work charged once per count-framed loop proportional to elements read (knot_count per axis, control_count*stored_dimension for the net)"
window_egress = [
  "cage.rs MeshExpand::data() (== MeshExpand::root.window()): the whole record slice handed to the legacy chunk_at record framing before the child View takes over the body",
]
ledger_level = 0

