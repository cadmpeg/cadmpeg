# SPDX-License-Identifier: Apache-2.0
#
# Per-module migration manifest for the Rhino `.3dm` decoder (doc section 8.6 /
# 10 Phase 2). One `[[module]]` entry per parser module. `status` is `migrated`
# or `legacy`; a `legacy` entry states, in `reason`, why the module has not yet
# graduated. `input_spaces` names the address spaces the module reads;
# `fuzz_targets` are the section 7 reachability targets that drive the committed
# path; `charges` names the budget dimensions the module drives; `cost_model`
# states the charge shape (never a flat unit per iteration). `window_egress`
# lists the audited `View::window()` sites the module keeps (section 8.8
# ratchet). `ledger_level` is the section 6.1 record-accounting level.
#
# Migration reality (recorded as a deviation for the integrator): this branch
# predates the Phase 0B `clippy.toml` `disallowed-methods` list and the
# crate-root `#![allow(clippy::disallowed_methods)]`. The Rhino decoder still
# reads object-record bodies through the crate-local `BoundedReader`
# (`chunks.rs`) over `&[u8]`, sizes collections with `Vec::with_capacity` from
# decoded counts, and carries recursion depth as a plain `depth: usize`
# parameter (`curves.rs` `MAX_CURVE_DEPTH`, `brep.rs`) rather than
# `ctx.descend()`. The one platform surface already adopted is decompression:
# every compressed mesh buffer inflates through `DecodeContext::begin_expand`
# (`mesh.rs`, Phase 1B), charging `decompressed_bytes`. Ordering below follows
# doc section 10 Phase 2: count-framed loops first, then irregular marker
# probes and graph traversals.

# ===========================================================================
# Migrated modules
# ===========================================================================

# Pure wire primitives. Every read is over a proven fixed-size `[u8; 16]`
# array; no untrusted count reaches an allocation, and no disallowed
# accumulation method is present, so the module graduates with the deny lint
# and has no `req_*`/`BoundedCount`/`read_counted` obligation. Reached
# indirectly by every object-record fuzz target through `Uuid`/`scaled_coordinate`.
[[module]]
path = "crates/cadmpeg-codec-rhino/src/wire.rs"
status = "migrated"
input_spaces = []
fuzz_targets = ["rhino_object_record", "rhino_container"]
charges = []
cost_model = "no budget charge; fixed-size [u8; 16] transforms and a finite-scale coordinate multiply, no framing decisions and no allocation from a decoded count"
window_egress = []
ledger_level = 0

