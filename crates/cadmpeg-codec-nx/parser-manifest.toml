# ---------------------------------------------------------------------------
# Irregular marker probes and record scans.

# Point and analytic geometry scanners. Each `while p + 2 <= stream.len()`
# marker walk advances by at least one byte per iteration over the finite
# inflated stream, and every field is read through a bounds-checked big-endian
# get before scale/finite/direction validation. Accumulators are `Vec::new`/
# `push`, bounded by the number of matching records in the stream. No
# `with_capacity`, no untrusted reservation. Carries the module deny lint.
[[module]]
path = "crates/cadmpeg-codec-nx/src/geometry.rs"
status = "legacy"
legacy_reason = "Reads hostile bytes on raw `&[u8]` (not a `View`) and threads no `DecodeContext`, so it uses no `BoundedCount`/`read_counted`/`exact_vec`/`grow_vec` and its `charges` is empty: the count-framed reservations and zero-floor knot expansion grow with only structural bounds (index-array floor, materialized-payload length, codec-local caps), and every scan pass over the inflated stream is uncharged work. Blocked on the legacy `decode.rs` bridge that hands the leaves a raw `root.window()` image instead of a threaded context; deferred to Phase 3D. The `cost_model` below states the current structural allocation/scan bound, not a budget charge."
input_spaces = ["parasolid_stream"]
fuzz_targets = ["nx_geometry_points", "nx_geometry_curves", "nx_geometry_surfaces"]
charges = []
cost_model = "bytes examined per marker scan: each of the three scanners is one linear pass over the inflated stream, output bounded by the count of valid records found"
window_egress = []
ledger_level = 0

