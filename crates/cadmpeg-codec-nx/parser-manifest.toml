# Per-module migration manifest for `cadmpeg-codec-nx` (doc section 8.6 / 10
# Phase 2). One `[[module]]` entry per decoder module. `status` is `migrated`
# or `legacy`; a `legacy` module records why it is not yet migrated. Order
# follows the Phase 2 rule: count-framed loops first, then irregular marker
# probes and graph traversals, with the container/orchestration modules last.
#
# `input_spaces` names the runtime address spaces (doc section 4.1) a module
# reads. The NX geometry, topology, NURBS, deltas, intersection, and object-model
# scanners all read the inflated Parasolid stream (`parasolid_stream`), a
# decompression `Transform` space registered by
# `DecodeContext::begin_expand`/`ExpandWriter::finalize` in `parasolid.rs`; every
# byte they read was already charged as `decompressed_bytes` at expand time and
# the whole stream length is finite, so their allocations are bounded by the
# already-charged inflated length. `charges` names the budget dimensions the
# module drives directly. The geometry/topology/NURBS/deltas/intersection/
# object-model leaf scanners thread no context, so they charge nothing and stay
# `legacy` with reasons: their allocations rest on structural bounds
# (already-charged inflated length plus codec-local caps), not on a budget
# charge, until the `decode.rs` bridge threads a `DecodeContext` in Phase 3D.
# `cost_model` states the allocation/scan bound (never a
# flat unit per iteration). `window_egress` lists the audited `View::window()`
# sites the module keeps, cross-referenced by the section 8.8 ratchet (crate
# ceiling 3: one in `decode.rs`, two in `parasolid.rs`). `ledger_level` is 0
# across the crate: NX is L0 (no byte ledger) per doc section 6.1.

# ---------------------------------------------------------------------------
# Count-framed loops. Legacy until the leaf scanners thread a context (Phase 3D).

# Object-model section framing. `indexed_sections` reads an entity-index array
# and object-id table whose element count is physically floored:
# `index_start = table - (count + 1) * 4` must be non-negative, so
# `count <= bytes.len() / 4`. The two count-framed reservations moved off
# `Vec::with_capacity(count +/- 1)` to `Vec::new`/`push` (lint-invisible per
# section 8), and the `2..=100_000` window stays as an extra codec-local cap.
# Every field read is a bounds-checked `u32_at`/slice get with checked
# arithmetic. Numeric-expression text is parsed from already-bounded record
# slices. Carries the module deny lint.
[[module]]
path = "crates/cadmpeg-codec-nx/src/om.rs"
status = "legacy"
legacy_reason = "Reads hostile bytes on raw `&[u8]` (not a `View`) and threads no `DecodeContext`, so it uses no `BoundedCount`/`read_counted`/`exact_vec`/`grow_vec` and its `charges` is empty: the count-framed reservations and zero-floor knot expansion grow with only structural bounds (index-array floor, materialized-payload length, codec-local caps), and every scan pass over the inflated stream is uncharged work. Blocked on the legacy `decode.rs` bridge that hands the leaves a raw `root.window()` image instead of a threaded context; deferred to Phase 3D. The `cost_model` below states the current structural allocation/scan bound, not a budget charge."
input_spaces = ["parasolid_stream"]
fuzz_targets = ["nx_om"]
charges = []
cost_model = "allocation bounded by input: index count physically floored to bytes.len()/4 by the index-array subtraction, plus a 2..=100_000 codec-local cap; scan is one linear pass over the object-id table with a per-candidate bounds-checked read"
window_egress = []
ledger_level = 0

# NURBS curve and surface families. Control-point vectors moved off
# `Vec::with_capacity(poles)` to `Vec::new`/`push`; `poles` is proven equal to
# `payload.values.len() / stride` before the loop, so the vector is bounded by
# the already-materialized payload length. Knot expansion (`expand_knots`) is the
# module's one zero-floor site: multiplicities are attacker-controlled `u16`
# values with no physical input floor, so the `repeat_n`-style expansion is
# capped by the codec-local `MAX_KNOT_ENTRIES` (2^20) and accumulated through a
# running-checked `push` loop (doc section 4.4 defense in depth). Descriptor,
# payload, and array reads are bounds-checked big-endian gets with `checked_mul`/
# `checked_div` framing. Carries the module deny lint.
[[module]]
path = "crates/cadmpeg-codec-nx/src/nurbs.rs"
status = "legacy"
legacy_reason = "Reads hostile bytes on raw `&[u8]` (not a `View`) and threads no `DecodeContext`, so it uses no `BoundedCount`/`read_counted`/`exact_vec`/`grow_vec` and its `charges` is empty: the count-framed reservations and zero-floor knot expansion grow with only structural bounds (index-array floor, materialized-payload length, codec-local caps), and every scan pass over the inflated stream is uncharged work. Blocked on the legacy `decode.rs` bridge that hands the leaves a raw `root.window()` image instead of a threaded context; deferred to Phase 3D. The `cost_model` below states the current structural allocation/scan bound, not a budget charge."
input_spaces = ["parasolid_stream"]
fuzz_targets = ["nx_nurbs_curves", "nx_nurbs_surfaces"]
charges = []
cost_model = "control points bounded by the materialized payload length (poles * stride == values.len()); knot expansion bounded by codec-local MAX_KNOT_ENTRIES cap over the untrusted multiplicity sum; candidate matching is one linear graph pass per record kind"
window_egress = []
ledger_level = 0

