# ---------------------------------------------------------------------------
# Graph traversals.

# Fixed-record topology graph and extractors. `Graph::parse` indexes records by
# type and XMT identifier in a single linear pass; the extractors
# (composite/intersection/blend/offset/surface/trimmed) resolve references
# through the index without recursion, so no `DepthGuard` is required. XMT
# reference sequences moved off `Vec::with_capacity(count)` to `Vec::new`/`push`;
# each iteration consumes at least two stream bytes and `read_xmt` returns `None`
# at end of record, bounding the vector by `bytes.len() / 2` independent of the
# requested `count`. All record reads are bounds-checked. Carries the module deny
# lint.
[[module]]
path = "crates/cadmpeg-codec-nx/src/topology.rs"
status = "legacy"
legacy_reason = "Reads hostile bytes on raw `&[u8]` (not a `View`) and threads no `DecodeContext`, so it uses no `BoundedCount`/`read_counted`/`exact_vec`/`grow_vec` and its `charges` is empty: the count-framed reservations and zero-floor knot expansion grow with only structural bounds (index-array floor, materialized-payload length, codec-local caps), and every scan pass over the inflated stream is uncharged work. Blocked on the legacy `decode.rs` bridge that hands the leaves a raw `root.window()` image instead of a threaded context; deferred to Phase 3D. The `cost_model` below states the current structural allocation/scan bound, not a budget charge."
input_spaces = ["parasolid_stream"]
fuzz_targets = ["nx_topology"]
charges = []
cost_model = "nodes plus edges: Graph::parse is one linear index pass; reference resolution is a bounded lookup per node; XMT sequences bounded by bytes.len()/2 regardless of the requested count"
window_egress = []
ledger_level = 0

