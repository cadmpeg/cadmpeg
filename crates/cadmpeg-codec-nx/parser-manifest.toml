# ---------------------------------------------------------------------------
# Decompression and space registration.

# Parasolid stream extraction. Already Phase-1 migrated: the canonical part
# payload registers as a `SpaceOrigin::Slice` alias of the root, the header scan
# charges its bytes as `work`, and every embedded zlib member inflates through
# `DecodeContext::begin_expand`/`ExpandWriter::write` so decompression is charged
# as `decompressed_bytes` and bounded by the per-expand and cumulative ceilings,
# registering a `Transform` space only on finalize. `MIN_INFLATED` (64) is a
# historical coincidence-rejection guess, not a resource bound. Two audited
# `window()` egress sites remain (below): the decompressor input and the header
# scan. Carries the module deny lint.
[[module]]
path = "crates/cadmpeg-codec-nx/src/parasolid.rs"
status = "migrated"
input_spaces = ["source", "part_payload"]
fuzz_targets = ["nx_parasolid"]
charges = ["decompressed_bytes", "work"]
cost_model = "work = part-payload bytes examined by the linear zlib-header scan (charged once); decompressed_bytes charged per ExpandWriter::write as each member inflates in 8 KiB chunks"
window_egress = [
  "inflate_stream: ZlibDecoder input over the compressed member view (decompressor egress)",
  "extract_streams: part-payload slice for the linear zlib-header scan",
]
ledger_level = 0

