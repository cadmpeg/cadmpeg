# SPDX-License-Identifier: Apache-2.0
#
# Per-module migration manifest for `cadmpeg-codec-catia` (doc section 8.6 /
# 10 Phase 2). One `[[module]]` entry per source module that reads or shapes
# untrusted `.CATPart` bytes. `status` is `migrated` or `legacy`; a `legacy`
# entry states, in `legacy_reason`, the specific migrated-means obligation it
# does not yet meet. `window_egress` lists the audited `View::window()` sites a
# migrated module keeps, cross-referenced by the section 8.8 ratchet. `charges`
# names the budget dimensions the module drives once migrated; `cost_model`
# states the intended charge shape (never a flat unit per iteration).
# `ledger_level` is the section 6.1 record-accounting level (0 pre-Phase-3).
#
# Ordering follows the doc Phase 2 rule: count-framed loops first (best
# closure-to-effort ratio), then irregular marker probes and graph traversals.
#
# Migration state of the crate: the container boundary consumes the session
# `View` per Phase 1A. `container` is now migrated: `scan_view` charges the
# whole-image directory scan as work, `register_extent_spaces` charges the
# per-extent graph footprint against `alloc_bytes`, `begin_derived_space`
# charges the reconstructed `Concat` BREP copy, and every former
# `Vec::with_capacity` directory accumulator is a lint-invisible `Vec::new`+push
# capped by `MAX_EXTENTS_PER_DESCRIPTOR`/the file length, so the module carries
# `#![deny(clippy::disallowed_methods)]`. `decode` stays legacy (it drives the
# still-legacy leaves on raw slices). All three `CatiaNative::decode` leaf
# parsers reached through `finish_decode` — `value_block` (`7C0B`), `catalog`
# (`7C02`), and `object_graph` (`7C08`) — are migrated: each takes
# `&DecodeContext` and the root `View`, charges its whole-image marker probe as
# work, and routes every allocation through a charged builder (`grow_vec`,
# `exact_vec` over a `View::counted` `BoundedCount`) or `charge_retained` for the
# raw-byte copies that escape as `Vec<u8>`. `native` — whose `decode` now
# delegates every hostile read to those three migrated leaves and only performs
# one-to-one typed transformations of records they already charged — and
# `variant` — a pure classifier with no hostile read — are migrated too. The
# `zero_entity` (`a9 03`) counted-topology leaf is migrated as well: its `parse`
# takes `&DecodeContext` and the root `View`, charges its stream walk as work,
# accumulates the zero-floor record stream through `grow_vec`, and charges each
# retained record copy through `charge_retained`.
# The remaining leaf record parsers (`geometry`, `topology`, `b5`, `e5`,
# and the `b5_transfer`/`decode` traversals) still read raw
# `&[u8]` through the checked `cadmpeg_ir::{le,be,read}` free functions, thread
# no `DecodeContext`, and so charge no work for their scans and size their
# accumulators with bare `Vec::with_capacity`. Bringing each to the migrated bar
# requires threading `&DecodeContext` and a `View` through its public entry and
# every caller in `decode.rs`; that cross-module signature change is the
# remaining Phase 2 work recorded here so the half-migrated state is auditable.

# ===========================================================================
# Count-framed record parsers (migrate first).
# ===========================================================================

# `7C0B` value blocks: a `windows(2)` marker scan whose payload copy is bounded
# by a length validated against the buffer before the copy.
[[module]]
path = "crates/cadmpeg-codec-catia/src/value_block.rs"
status = "migrated"
input_spaces = ["active_brep"]
fuzz_targets = ["catia_value_block"]
charges = ["work", "retained_bytes"]
cost_model = "work = whole-image byte length examined once by the `7C0B` marker probe (charged up front in `parse`); retained_bytes = each admitted block's payload length, charged through `charge_retained` before `to_vec()` takes the copy"
window_egress = ["value_block::parse -> View::window() feeds the `7C0B` marker probe over the whole admitted image; length charged as work before the scan"]
ledger_level = 0
migrated_means = "Marker probe charges work proportional to bytes examined; the payload copy is charged as retained_bytes before it is taken (raw-byte egress routed through `charge_retained`, not faked); block accumulator is a `grow_vec` that charges before each reservation; `declared_len` is validated against the buffer so there is no unfloored allocation; module carries `#![deny(clippy::disallowed_methods)]`; truncation test `value_block_parser_rejects_payload_truncated_before_terminator` covers the record boundary; `catia_value_block` fuzz target reaches the committed path. No recursion, no floored count, so no DepthGuard/BoundedCount obligation."

# `7C02` string catalogs: framed length-prefixed string table with a
# `Vec::with_capacity` sized from a decoded entry count.
[[module]]
path = "crates/cadmpeg-codec-catia/src/catalog.rs"
status = "migrated"
input_spaces = ["active_brep"]
fuzz_targets = ["catia_catalog"]
charges = ["work", "alloc_bytes"]
cost_model = "work = whole-image byte length examined once by the `7C02` marker probe (charged up front in `parse`), plus each `7C02` candidate's framed `total_len` charged before its nested entry walk so overlapping candidates cannot run an uncharged quadratic scan; alloc_bytes = per-catalog entry vector reserved exactly through `exact_vec` over a `View::counted` `BoundedCount(entry_count, min_element_size = 1)` proven against the frame's remaining bytes"
window_egress = ["catalog::parse -> View::window() feeds the `7C02` marker probe over the whole admitted image; length charged as work before the scan"]
ledger_level = 0
migrated_means = "Marker probe charges work proportional to bytes examined; the entry table is sized through a `View::child(at, end).counted(entry_count, 1)` `BoundedCount` proof and filled through an `exact_vec` builder, so a declared count that cannot physically fit the frame is refused before any capacity is reserved (replaces the former `Vec::with_capacity(count)`); entries are pushed into the exact builder and returned via `finish`; module carries `#![deny(clippy::disallowed_methods)]`; truncation test `catalog_parser_rejects_frame_truncated_at_entry_boundary` covers the framed `total_len` record boundary; `catia_catalog` fuzz target reaches the committed path. No recursion, so no DepthGuard obligation."

# `7C08`/`7C09` outer object-ownership graph: nested count-framed records.
[[module]]
path = "crates/cadmpeg-codec-catia/src/object_graph.rs"
status = "migrated"
input_spaces = ["active_brep"]
fuzz_targets = ["catia_object_graph"]
charges = ["work", "alloc_bytes", "retained_bytes"]
cost_model = "work = whole-image `7C08`/`7CD9`/alias marker length examined once per scan (charged up front), plus each `7C08` candidate's framed `total_len` as the bytes its nested `7C09` record walk examines; alloc_bytes = per-element grow_vec charges over the record run, head-token stream, payload-field stream, and `0x3b` list items; retained_bytes = each `0xe5` payload blob and each `7CD9` context window, charged before the copy"
window_egress = [
  "object_graph::parse -> View::window() feeds the `7C08` marker probe over the whole admitted image; length charged as work before the scan",
  "object_graph::surface_aliases -> View::window() feeds the `01 00 04 00` alias marker probe; length charged as work before the scan",
  "object_graph::markers_7cd9 -> View::window() feeds the `7CD9` marker probe; length charged as work before the scan, each retained context window charged before copy",
]
ledger_level = 0
migrated_means = "Every marker scan charges work proportional to bytes examined, and each `7C08` candidate charges its framed extent before the nested `7C09` walk; records, head tokens, payload fields, `0x3b` list items, alias rows, and `7CD9` markers accumulate through `grow_vec`, charging before each reservation; the two raw-byte copies that escape as `Vec<u8>` (the `0xe5` blob payload and the `7CD9` context window) are charged through `charge_retained` before `to_vec()` (raw-byte egress routed, not faked); alias rows are fixed-width reads with no untrusted-count allocation. The parser is a pure `Option` probe (section 3.3): any framing inconsistency returns `None` (NoMatch), never a committed error, so no `req_*` mirror and no `BoundedCount` proof applies — production is marker-delimited and conditional, not a floored count. No recursion, so no `DepthGuard` obligation. Module carries `#![deny(clippy::disallowed_methods)]`; truncation test `outer_object_graph_parser_rejects_frame_truncated_at_record_boundary` covers the framed `7C08` record boundary; the `catia_object_graph` fuzz target reaches `parse`, `surface_aliases`, and `markers_7cd9` under a default session."

# Zero-entity `a9 03` counted topology: record walk plus face/loop/carrier and
# edge/vertex table reconstruction.
[[module]]
path = "crates/cadmpeg-codec-catia/src/zero_entity.rs"
status = "migrated"
input_spaces = ["active_brep"]
fuzz_targets = ["catia_zero_entity"]
charges = ["work", "alloc_bytes", "retained_bytes"]
cost_model = "work = whole-window byte length examined once by the `a9 03` stream walk (charged up front in `walk_records`); alloc_bytes = per-record `grow_vec` charge over the zero-floor record stream; retained_bytes = each admitted record's framed extent, charged through `charge_retained` before `to_vec()` copies the record body"
window_egress = ["zero_entity::walk_records -> View::window() feeds the `a9 03` stream walk over the whole admitted image; length charged as work before the scan"]
ledger_level = 0
migrated_means = "`parse` takes `&DecodeContext` and the root `View`; `walk_records` charges the whole-window scan as `work` up front, accumulates the zero-floor `a9 03` record stream through `grow_vec` (charging before each reservation, so an unbounded stream fuses on the alloc budget rather than needing a separate codec cap), and charges each retained `record.bytes` copy through `charge_retained` before it is taken (raw-byte egress routed, not faked). The downstream reference-lane decoders (`parse_face`, `parse_loop`, `parse_vertices`, `parse_side_pairs`, `counted_references`) read only the already-retained, already-charged record copy through the checked `cadmpeg_ir::le` accessors; their reference lanes are bounded by a single count header byte (<= 127) validated to consume five bytes per entry, so they use lint-invisible `Vec::new`+push (doc section 8.3) with no further untrusted-count allocation, and the former two `Vec::with_capacity` sites (`counted_references`, `parse_loop` senses) are removed. The parser is a pure `Option` probe (section 3.3): any framing inconsistency returns `Ok(None)`, never a committed error, so no `req_*` mirror and no `BoundedCount` proof applies. The `parse_carrier_runs`/`bind_face_runs` graph binding is a bounded pass over already-admitted records with no recursion, so no `DepthGuard` obligation. Module carries `#![deny(clippy::disallowed_methods)]`; truncation test `zero_entity_parser_rejects_record_truncated_at_declared_length` covers the `a9 03` record-length boundary; the `catia_zero_entity` fuzz target reaches `parse` under a default session."

