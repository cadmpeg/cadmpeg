# `V5_CFV2` container parsing and logical-stream reconstruction.
[[module]]
path = "crates/cadmpeg-codec-catia/src/container.rs"
status = "migrated"
input_spaces = ["root", "active_brep"]
fuzz_targets = ["catia_container", "catia_container_dir"]
charges = ["work", "alloc_bytes"]
cost_model = "work = whole-image byte length charged by `scan_view` for the `CB0001` directory self-consistency scan (`catia_container_scan`, `dirbuf` a subslice of the charged image), plus the census passes `identify` runs: three whole-image scans (A9 count, E5 count, E5 record-stream search) charged as `catia_container_census` and three reconstructed-BREP scans (FBB runs, edge delimiters, vertex markers) charged as `catia_brep_census`; alloc_bytes = `PER_EXTENT_GRAPH_BYTES` per registered physical extent (charged up front in `register_extent_spaces`) plus the reconstructed `Concat` BREP body, which `begin_derived_space` copies and charges as `alloc_bytes` (reason `derived_concat`, per doc §4.5) at assembly"
window_egress = [
  "container.rs Concat extent slices passed to begin_derived_space (untrusted framing ends at the directory; the derived-space writer charges the copy)",
]
ledger_level = 0
migrated_means = "The session path (`scan_view`) charges the whole-image directory scan as `work` before any walk, charges the per-extent runtime-graph footprint against `alloc_bytes` in `register_extent_spaces`, and defers the reconstructed BREP copy to `begin_derived_space`, which charges that copy against `alloc_bytes` (reason `derived_concat`) because a `Concat` derived space charges `alloc_bytes`, not `decompressed_bytes` (doc §4.5). Every directory accumulator that previously used `Vec::with_capacity` (the per-descriptor extent list, the reconstructed logical stream, the BREP extent-range list, the `Concat` segment list) is now a lint-invisible `Vec::new`+push/extend (doc section 8.3): each is floored and capped by a structural gate — extent counts by the `MAX_EXTENTS_PER_DESCRIPTOR` (64) constant and the `o + 4 + 20*k <= dirbuf.len()` buffer-fit check, the reconstructed length by the file length validated at descriptor admission — so no untrusted count drives a reservation and no `BoundedCount` proof is owed. The directory parser is a pure `Option` probe (section 3.3): any framing inconsistency returns `None`, never a committed error, so no `req_*` mirror applies. No recursion, so no `DepthGuard` obligation. Module carries `#![deny(clippy::disallowed_methods)]`; truncation test `container_directory_parser_rejects_frame_truncated_at_directory_boundary` covers the `dir_offset + b` directory-frame boundary; the `catia_container` and `catia_container_dir` fuzz targets reach the directory walk. The context-free `scan_bytes`/`parse_stream_directory`/`brep_stream` entries run the same bounded walk without a session for tests, census, and fuzzers."

