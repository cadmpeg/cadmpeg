# SPDX-License-Identifier: Apache-2.0
#
# Per-module migration manifest for `cadmpeg-codec-sldprt` (doc section 8.6 /
# 10 Phase 2). One `[[module]]` entry per decoder module — a module that reads
# untrusted bytes or shapes decoded records. Encoder-only modules (`writer.rs`,
# `writer_patch.rs`, `writer_transform.rs`) implement the `Encoder` trait and
# carry no decode read path; they are outside the Phase-2 decode ratchet and are
# intentionally absent, matching the platform manifest, which omits writers.
#
# `status` is `migrated` or `legacy`. A `migrated` module satisfies the full
# section-10 checklist: hostile reads through `View` or a proven fixed-size
# array; `req_*` mirrors for committed required reads; `BoundedCount` for
# floored counts; `read_counted`/`exact_vec` for count-framed collections;
# `grow_vec` for accumulators; `alloc_unfloored` plus a codec-local cap for
# zero-floor production; `DepthGuard` on recursion; work charged per a stated
# honest cost model; module-level `#[deny(clippy::disallowed_methods)]`. A
# `legacy` module carries a written reason for staying legacy.
#
# `window_egress` lists the audited `View::window()` sites a graduated module is
# allowed to keep (section 8.8 ratchet). `charges` names the budget dimensions
# the module drives; `cost_model` states the charge shape (never a flat unit per
# iteration). `ledger_level` is the section 6.1 record-accounting level; sldprt
# is L0 until Phase 3.
#
# Migration state (this batch). Container decompression is already migrated:
# `container::admit_block` streams every block's DEFLATE payload through
# `DecodeContext::begin_expand`/`ExpandWriter` (`ExpandSpec::Exact`), charging
# `decompressed_bytes` per chunk before the arena grows and registering the
# derived `Transform` space on `finalize`. The residual is downstream of that
# egress: `admit_block` copies each finalized inflated `View` into an owned
# `Block::payload`/`ps_streams` `Vec` for the legacy leaf and writer paths, and
# every leaf geometry, history, and metadata module then reads that owned buffer
# with the legacy `cadmpeg_ir::read`/`le` free functions rather than a `View`.
# Threading a `View` into the leaves is gated on `ContainerScan` retaining the
# derived-space `View`/`SpaceId` instead of the owned copy (`View::over_space` is
# `pub(crate)`, so a codec leaf cannot reconstruct one over a bare slice, and no
# public `ctx.space_view(SpaceId)` re-view API exists — see `shared_requests`).
# That container-to-leaf View plumbing is the high-risk work that remains; the
# four modules with no hostile-byte read path graduate now, and every module that
# still parses raw framing over the owned buffer is listed `legacy` with the
# concrete residual named. Count-framed collection sites are ordered first below,
# then irregular marker probes and graph traversals.

# ===========================================================================
# Migrated — no hostile-byte read path. These modules shape already-typed
# records or validated JSON; they graduate with the module-level deny and carry
# no `req_*`/`BoundedCount`/`DepthGuard` obligations, matching the platform
# manifest's model/namespace entries.
#
# Errata (commit 5603466c). That commit's body claims `annotations`,
# `classification`, `native`, and `records` "read their record bodies through
# the pre-`View` path and sized their accumulators from decoded lengths" and were
# graduated "reading through the charged `View`/`exact_vec`/`grow_vec` primitives
# with stated allocation bounds". Both halves are false: these four modules never
# had a hostile-byte read path, they call no `View`/`exact_vec`/`grow_vec`/`req_*`
# primitive, and they charge nothing (`charges = []` below). They graduate purely
# on the "no hostile-byte read path" criterion recorded in their entries and doc
# comments — not on any bounded-read migration. The genuine hostile paths
# (`brep/*`, `history`, `parasolid`, `container`) remain `legacy` and uncharged.
# This note is the reconciliation; the commit body cannot be amended.
# ===========================================================================

