# ===========================================================================
# Legacy — modules with a raw `flate2` `read_to_end` decompression sink: a
# class-A sink whose output is proportional to attacker-controlled compression
# ratio, not input size. Migration routes through
# `DecodeContext::begin_expand`/`ExpandWriter`, which charges
# `decompressed_bytes` before the buffer grows. `container.rs` is NOT in this
# class — its block inflation already streams through `begin_expand` (see its
# entry); it stays legacy for the marker-scan/owned-buffer residual only.
# ===========================================================================

[[module]]
path = "crates/cadmpeg-codec-sldprt/src/container.rs"
status = "legacy"
input_spaces = ["root"]
fuzz_targets = ["sldprt_container", "sldprt_container_scan"]
charges = ["work", "decompressed_bytes", "alloc_bytes"]
cost_model = "partial (Phase 1A/1B landed): block inflation already streams through `DecodeContext::begin_expand`/`ExpandWriter` under `ExpandSpec::Exact`, charging `decompressed_bytes` per `EXPAND_CHUNK` write *before* the arena grows, so the decompression sink is bounded and is no longer the residual; the outer marker scan charges `work` over bytes examined and `alloc_bytes` per admitted space-graph record. The two residuals keeping the module `legacy` are: the marker scan still reads untrusted block framing through `root.window()` (a `&[u8]` scan, not `View` cursor/`req_*` reads), and each block's inflated `View` is copied into an owned `Block::payload`/`ps_streams` `Vec` for the legacy leaf and writer paths, severing the derived-space `View`. Graduates when the marker scan reads through `View` and `ContainerScan` retains the derived-space `View`/`SpaceId` instead of owned buffers"
window_egress = [
  "scan_view: root.window() feeds the marker scanner over the raw source framing (untrusted-framing residual, not a compressed-input boundary)",
  "inflate_block: source.window() feeds the DeflateDecoder *compressed input* (permitted decompressor-input egress, section 8.8); output is written through the charging `ExpandWriter`, not `window()`",
  "admit_block: view.window() copies the finalized inflated space into the owned `Block::payload` for the legacy leaf/writer paths",
]
ledger_level = 0

