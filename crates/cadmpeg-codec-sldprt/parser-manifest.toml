# SPDX-License-Identifier: Apache-2.0
#
# Parser migration manifest for cadmpeg-codec-sldprt (doc section 10 Phase 2,
# section 8). Every decoder module in the crate is listed exactly once. Modules
# are ordered count-framed loops first, then irregular marker probes and graph
# traversals, then container/orchestration. Encoder modules (writer, writer_patch,
# writer_transform) are excluded: they emit bytes and are covered by the section 8
# writer-field rules, not the decode migrated-means checklist.
#
# A module is `status = "migrated"` only when it satisfies the full section 8
# migrated-means checklist: View or proven fixed-size arrays for every hostile
# read; req_* mirrors for committed required reads; BoundedCount for floored
# counts; read_counted/exact_vec for count-framed collections; grow_vec for
# accumulators; alloc_unfloored plus a codec-local cap for zero-floor production;
# DepthGuard on recursion; work charged per a stated cost model; lint exceptions
# via expect-with-reason; a declared fuzz target reaching the committed path;
# truncation tests at the module record boundaries; deterministic output; and a
# module-level deny(clippy::disallowed_methods).
#
# BRANCH REALITY (recorded as the section 11 minimal-faithful resolution): the
# platform migration API this checklist names is NOT present in `cadmpeg-ir` on
# this branch. `cadmpeg-ir::cursor` exposes only `Cursor`, `bounded_len`,
# `Cursor::counted`, and `Cursor::read_counted`; there is no `View` (hence no
# `View::window`/`req_*`/`View::counted`), no `BoundedCount`, no `grow_vec`, no
# `alloc_unfloored`, no `DepthGuard`, and no `begin_expand`/`ExpandWriter`.
# `cadmpeg-ir::compression::inflate_zlib_prefix` is an uncapped
# `ZlibDecoder::read_to_end`. Because `cadmpeg-ir`, the workspace `Cargo.toml`,
# and `crates/cadmpeg-fuzz/Cargo.toml` are all OUTSIDE this leg's editable scope,
# and because faking migration by handing back byte slices is forbidden by the
# raw-byte egress rule, no sldprt decoder module can currently graduate to
# `migrated`. Every module below is therefore `legacy` with a written reason
# anchored to the specific missing primitive(s). The concrete `cadmpeg-ir` and
# fuzz-manifest edits required to unblock graduation are enumerated in the leg's
# shared_requests. Per-module calibration observations for the freeze step live
# in `calibration-note.md`.

[meta]
crate = "cadmpeg-codec-sldprt"
phase = "2"
platform_api_present = false
# Primitives the migrated-means checklist requires that are absent on this branch.
missing_primitives = [
  "cadmpeg_ir::view::View",
  "View::window",
  "View::counted",
  "View::req_u16 / req_u32 / req_f64 (req_* mirrors)",
  "cadmpeg_ir::bounded::BoundedCount",
  "cadmpeg_ir::alloc::grow_vec",
  "cadmpeg_ir::alloc::alloc_unfloored",
  "cadmpeg_ir::guard::DepthGuard",
  "cadmpeg_ir::expand::begin_expand / ExpandWriter",
  "a bounded (capped) replacement for cadmpeg_ir::compression::inflate_zlib_prefix",
]
present_primitives = [
  "cadmpeg_ir::cursor::Cursor",
  "cadmpeg_ir::cursor::bounded_len",
  "cadmpeg_ir::cursor::Cursor::counted",
  "cadmpeg_ir::cursor::Cursor::read_counted",
]

