#
# Frozen per-crate ceiling for `Cursor` references (doc section 8.5). `Cursor`
# is the pre-migration reader that `View` replaces; it is not `#[deprecated]`
# in Phase 0 because `-D warnings` would turn every reference red at once.
# Instead CI tracks each crate's `Cursor`-reference count as a frozen,
# monotonically decreasing ratchet, mirroring the `window()` egress ratchet.
# The `#[deprecated]` attribute lands per crate once its count reaches zero.
#
# The `tests/cursor_reference_ratchet.rs` test counts `Cursor` occurrences in
# each crate's `src` and `fuzz_targets` trees and fails if a crate exceeds its
# ceiling. Lowering a count means lowering the number here in the same commit;
# raising one is a ratchet violation. Every crate directory under `crates/`
# must appear below: the test fails any crate with no ceiling, so new crates
# cannot escape by omission. Detection is textual (`Cursor` substring), so a
# reference spelled to dodge the match still bypasses the ceiling; that
# residual gap is held by review discipline rather than by this test.
[crates]
cadmpeg = 0
cadmpeg-ir = 18
# `cadmpeg-codec-f3d`'s count is entirely `std::io::Cursor` for zip container
# I/O (`ZipWriter`/`ZipArchive` need a `Seek` reader/writer), not the domain
# `Cursor` reader `View` replaces; it therefore cannot ratchet to zero and grows
# by one per new zip-building test. Raised 374 -> 377 for the three
# `std::io::Cursor` uses in `truncation_at_design_body_member_boundaries_is_deterministic_and_never_panics`,
# then 377 -> 379 for the two `std::io::Cursor` decode drivers in the Phase 3D
# record-ticket transfer-accounting tests.
cadmpeg-codec-f3d = 379
# Raised 390 -> 391 for the `std::io::Cursor` driver in the Phase 3C
# `source_fidelity` determinism test, which exercises the reader-based codec
# entry rather than the domain `Cursor` reader `View` replaces, then 391 -> 393
# for the two `std::io::Cursor` decode drivers in the Phase 3D transfer-accounting
# tests.
cadmpeg-codec-sldprt = 393
# Raised 20 -> 25 for the five `std::io::Cursor` decode drivers in the Phase 3D
# record-ticket transfer-accounting tests, not the domain `Cursor` reader `View`
# replaces.
cadmpeg-codec-catia = 25
# Raised 9 -> 11 for the two `std::io::Cursor` decode drivers in the Phase 3D
# record-ticket transfer-accounting test.
cadmpeg-codec-creo = 11
# Raised 58 -> 59 for the `std::io::Cursor` driver in the new Phase 3C
# accounting test, an in-memory `ReadSeek` for decode, not the domain `Cursor`
# reader `View` replaces, then 59 -> 62 for the three `std::io::Cursor` decode
# drivers in the Phase 3D record-ticket transfer-accounting tests.
cadmpeg-codec-nx = 62
cadmpeg-codec-rhino = 48
cadmpeg-step = 0
cadmpeg-harness = 3
cadmpeg-fuzz = 34
