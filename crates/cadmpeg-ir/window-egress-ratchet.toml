#
# Per-crate ceiling for `View::window()` raw-byte egress sites. A site must be
# named in its module's `parser-manifest.toml` `window_egress` list.
#
# The `tests/window_egress_ratchet.rs` test counts `.window()` occurrences in
# each crate's `src` and `fuzz_targets` trees and fails if a crate exceeds its
# ceiling. Lowering a count means lowering the number here in the same commit;
# raising one is a ratchet violation and must be justified by a manifest
# window_egress entry. Every crate directory under `crates/` must appear below:
# the test fails any crate with no ceiling, so new crates cannot escape by
# omission.
[crates]
cadmpeg = 0
cadmpeg-ir = 8
cadmpeg-codec-f3d = 6
cadmpeg-codec-sldprt = 4
cadmpeg-codec-catia = 10
cadmpeg-codec-creo = 1
cadmpeg-codec-freecad = 2
cadmpeg-codec-iges = 2
cadmpeg-codec-nx = 3
cadmpeg-codec-rhino = 5
cadmpeg-step = 2
cadmpeg-harness = 0
cadmpeg-fuzz = 0
