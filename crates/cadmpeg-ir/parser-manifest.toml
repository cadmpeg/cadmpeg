[[module]]
path = "crates/cadmpeg-codec-freecad/src/lib.rs"
status = "legacy"
legacy_reason = "The ZIP container scanner still accepts `Read + Seek`; inspect and decode each bridge one finite root `View` window into that legacy interface."
input_spaces = ["source"]
fuzz_targets = ["freecad_zip_container", "freecad_document_xml", "freecad_gui_xml", "freecad_brep"]
charges = ["work"]
cost_model = "two adapter calls expose the finite source window; container scanning is bounded by the source length and decode charges work before scanning"
window_egress = ["inspect_impl: root.window() -> container::scan", "decode_impl: root.window() -> container::scan"]
ledger_level = 1

