# ===========================================================================
# Migrated — context-independent graph traversal over decoded rows.
# ===========================================================================

# Topology edge graph. Every entry point (`build`, `face_components`,
# `vertex_orbits`) consumes already-decoded `CurveTopologyRow` values, never
# hostile bytes or an untrusted count: `edges` builds two half-edges per row
# (`topology.rs:202` `for side in 0..2`) into a `Vec::new` + push accumulator
# bounded by `rows.len() * 2`, and the loop/orbit traversals iterate under
# monotone `BTreeSet` visited guards, so they terminate in the decoded edge
# count with no recursion and no `DepthGuard` obligation. Work is bounded by the
# already-charged decoded rows, so no separate budget charge arises (same basis
# as `datum.rs`). Replacing the former `Vec::with_capacity(rows.len() * 2)` with
# `Vec::new` + push clears the last disallowed method, so the module graduates
# with the deny lint and no `req_*`/`BoundedCount` obligation.
[[module]]
path = "crates/cadmpeg-codec-creo/src/topology.rs"
status = "migrated"
input_spaces = ["psb_section"]
fuzz_targets = ["decode_pipeline_mutated"]
charges = []
cost_model = "no budget charge; operates on already-decoded rows, edge graph and traversals bounded by the admitted row count, all disallowed methods removed"
window_egress = []
ledger_level = 0

