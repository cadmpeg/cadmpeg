#
# Per-module migration manifest for the Creo PSB decoder (doc section 8.6 /
# 10 Phase 2). One `[[module]]` entry per module that reads untrusted bytes.
# `status` is `migrated` or `legacy`. A `migrated` module satisfies the full
# section 10 checklist: `View`/fixed-size arrays for hostile reads, `req_*`
# mirrors for committed required reads, `BoundedCount`/`read_counted`/
# `exact_vec` for count-framed collections, `grow_vec` for accumulators,
# `alloc_unfloored` plus a codec-local cap for zero-floor production,
# `DepthGuard` on recursion, work charged per a stated cost model, and
# module-level `#[deny(clippy::disallowed_methods)]`. A `legacy` module states
# in `cost_model` why it is not yet migrated and names its high-risk sites.
# `window_egress` lists audited `View::window()` sites (section 8.8 ratchet);
# `ledger_level` is the section 6.1 record-accounting level (0 in Phase 2).
#
# Order: count-framed loops first, then irregular marker probes and graph
# traversals (doc section 10). The four graduated modules (`psb.rs`,
# `scalar.rs`, `datum.rs`, `topology.rs`) are context-independent: the first
# three are primitive decoders whose outputs are bounded by input bytes or a
# compile-time constant, and `topology.rs` traverses already-decoded typed rows
# under monotone visited guards — none is bounded by an untrusted count. Every
# remaining count-framed structural reader still routes untrusted `compact_int`
# counts through raw `&[u8]` slices and stays `legacy` until it threads
# `DecodeContext`/`View` and the `BoundedCount`/`read_counted` API.

# ===========================================================================
# Migrated — context-independent primitive decoders.
# ===========================================================================
#
# Errata (commit a9edf349). That commit's body claims `psb`, `scalar`, and
# `datum` "read through the pre-`View` path and sized their token and scalar
# buffers without a charged reservation" and were graduated by reading "through
# a bounded `View` with the `req_*` mirror" and reserving "through the charged
# `exact_vec`/`grow_vec` primitives". Both halves are false: these three modules
# call no `View`/`DecodeContext`/`req_*`/`exact_vec`/`grow_vec`/`BoundedCount`
# primitive, and they charge nothing (`charges = []` below). They graduate purely
# on the "output bounded by input bytes / a compile-time constant, no untrusted-
# count allocation" criterion recorded in their entries and doc comments, ratcheted
# by the module-level `#![deny(clippy::disallowed_methods)]` — not on any bounded-
# read migration. The genuine count-framed hostile paths (`surface`, `feature`,
# `container`, and the other structural scanners) remain `legacy` and uncharged.
# This note is the reconciliation; the commit body cannot be amended.

# Pure primitive decoder over a caller-owned slice. `tokens` accumulates one
# entry per structural form while walking `while offset < data.len()`, so its
# output length is bounded by input bytes, never by an untrusted count;
# hostile-length reads are bounds-checked `get`s and the `data[offset]` head
# read is proven in range by the `while offset < data.len()` loop bound. No
# disallowed accumulation method is
# reachable, so it graduates with the deny lint and no `req_*`/`BoundedCount`
# obligation, mirroring the platform `read.rs`/`le.rs` primitives.
[[module]]
path = "crates/cadmpeg-codec-creo/src/psb.rs"
status = "migrated"
input_spaces = []
fuzz_targets = ["creo_psb_tokens", "creo_compact_int", "creo_short_form_float"]
charges = []
cost_model = "no budget charge; bounds-checked slice reads, token accumulation proportional to the validated input length"
window_egress = []
ledger_level = 0

# Pure primitive decoder. `ScalarCache::from_section` grows one entry per
# distinct `0x46` token found while scanning `0..section.len()`, bounded by
# input bytes; token distinctness is a hash-set membership test so the pass is
# linear in the section length (not the former O(n^2) rescan of the entry
# vector). `decode`/`decode_in_lane` are bounds-checked `Option` probes over a
# caller-owned slice with no untrusted-count allocation. Graduates with the deny
# lint on the same basis as `psb.rs`.
[[module]]
path = "crates/cadmpeg-codec-creo/src/scalar.rs"
status = "migrated"
input_spaces = []
fuzz_targets = ["creo_scalar"]
charges = []
cost_model = "no budget charge; bounds-checked slice reads, cache accumulation proportional to the validated section length"
window_egress = []
ledger_level = 0

