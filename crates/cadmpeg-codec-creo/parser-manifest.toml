# ===========================================================================
# Typed lossy construction at the named boundaries (doc section 6.2 / 10
# Phase 4B).
# ===========================================================================

# Typed lossy builder. Not a byte parser: wraps the platform
# `cadmpeg_ir::transfer::Builder` over the decode's loss channel and is the
# codec's single lossy-construction path. The datum-plane u-axis resolves a
# `Transfer::fallback` and every incomplete-frame / unplaced-sketch omission
# resolves a `Transfer::omitted`, so no fallback or drop reaches the model
# without surrendering its `LossNote`. No hostile read, no `.window()` egress,
# and no budget charge of its own. Its `semantic_builder` flag is the doc
# section 7 capability-matrix signal that creo has adopted the typed lossy
# builder, gating the `no_silent_fallback` stage-2 oracle.
[[module]]
