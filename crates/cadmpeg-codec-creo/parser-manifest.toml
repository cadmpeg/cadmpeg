# ===========================================================================
# Migrated — context-independent datum-plane decoder.
# ===========================================================================

# Datum-plane rows. Re-audited against the current source: `planes` accumulates
# one candidate per byte position while walking `0..payload.len()` with
# `Vec::new` + `push`, bounded by input bytes; the only `with_capacity` site
# (`scalars`, formerly `datum.rs:120`) is sized by a fixed caller-supplied
# literal (`count == 10`), never an untrusted `compact_int`. There is no
# `read_plane_values` and no attacker-controlled count in this module. Replacing
# the fixed-width `with_capacity` with `Vec::new` + `push` clears the last
# disallowed method, so the module graduates with the deny lint on the same
# basis as `psb.rs`/`scalar.rs`, with no `req_*`/`BoundedCount` obligation.
[[module]]
path = "crates/cadmpeg-codec-creo/src/datum.rs"
status = "migrated"
input_spaces = ["psb_section"]
fuzz_targets = ["creo_datum", "decode_pipeline_mutated"]
charges = []
cost_model = "no budget charge; bounds-checked slice reads, candidate accumulation proportional to the validated payload length, fixed-width row fill bounded by a compile-time constant"
window_egress = []
ledger_level = 0

# Surface prototype rows. `scalar_slots` sizes `Vec::with_capacity(count)` then
# `slots.resize(count, None)` (`surface.rs:612`/`surface.rs:622`); `resize` is a
# disallowed method, but the count is NOT unbounded: it is `dimensions * count`
# where both are single `u8` fields (`surface.rs:419`-`420`), so the fill is
# capped at 255*255 = 65025 `Option<f64>` slots (~1 MiB) per record.
# `named_surface_value` runs `for _ in 0..count` fills (`surface.rs:404`) and the
# `ContiguousEntityReferences` expansion `(start_id..end_id).collect()`
# (`surface.rs:397`) over a `compact_int` count; `psb::compact_int` is a two-byte
# varint capped at 16383 (`psb.rs`), so those collect at most 16383 `u32`
# (~64 KiB) per record, and each record consumes input bytes. Migration
# obligation is the ratchet, not a DoS: remove the `resize`/`with_capacity`
# disallowed methods (bounded push loop or `exact_vec` via `View::counted`),
# charge `alloc_bytes` for the per-record slot fill, and thread `View`/`req_*`.
# Legacy until then.
[[module]]
path = "crates/cadmpeg-codec-creo/src/surface.rs"
status = "legacy"
input_spaces = ["psb_section"]
fuzz_targets = ["creo_surface_rows", "decode_pipeline_mutated"]
charges = []
cost_model = "bounded but uncharged: with_capacity + resize at surface.rs:612/622 sized by two u8 fields (<=65025 slots); compact_int-count fills/collect at surface.rs:397/404 capped at 16383 (varint ceiling); no alloc_bytes charge, disallowed methods not yet removed"
window_egress = []
ledger_level = 0

# Feature records — the largest count-framed surface. Several `Vec::with_capacity`
# + `for _ in 0..count` fills (`feature.rs:871`/`886` slot and value arrays,
# `feature.rs:2188`/`2497` id and entry arrays) and declared-count key/value loops
# (`feature.rs:980`/`1099`/`1252`/`1383`). Every count is bounded small: the slot
# counts at 871 derive from two `u8` fields (`feature.rs:2015`, `payload[1] *
# payload[2]`, <=65025) or a literal 12 (`feature.rs:2369`), and the id/entry/loop
# counts come from `psb::compact_int`, a two-byte varint capped at 16383. No fill
# is attacker-unbounded, but none proves the count through `View::counted` or
# charges `alloc_bytes`, and the `with_capacity` sites are disallowed methods.
# Largest ratchet surface; migrate the fills to `exact_vec`/`read_counted` with a
# per-collection `BoundedCount` and charge the per-record allocation. Legacy until
# then.
[[module]]
path = "crates/cadmpeg-codec-creo/src/feature.rs"
status = "legacy"
input_spaces = ["psb_section"]
fuzz_targets = ["decode_pipeline_mutated"]
charges = []
cost_model = "bounded but uncharged: with_capacity + 0..count fills at feature.rs:871/886/2188/2497 and declared-count loops at 980/1099/1252/1383; counts capped by two u8 fields (<=65025) or the compact_int varint ceiling (16383); no BoundedCount, no alloc_bytes charge, disallowed methods not yet removed"
window_egress = []
ledger_level = 0

# Container scan and namespace-count headers. `read_array_count` sums `compact_int`
# counts into a `u32` (`container.rs:392`, no allocation), and the `parent_feats`
# reference collection runs `for _ in 0..count` over ids from a `compact_int` count
# into a `BTreeSet` insert accumulator (`container.rs:703`); count is capped at 16383
# by the varint and the loop also breaks on no-progress, so it is bounded by input
# bytes and uses no disallowed method — only the `work` charge is missing.
# `Vec::with_capacity(hits.len())` (`container.rs:332`) is a disallowed method
# bounded by the completed scan, not by an untrusted count. `scan_view` calls
# `View::window()` once (`container.rs:923`) to hand raw container bytes to the
# section splitter — the audited raw-byte egress named below. Legacy until the
# accumulator charges `work`/`alloc`, the `with_capacity` is removed, and the
# section split consumes `View` instead of the raw window.
[[module]]
path = "crates/cadmpeg-codec-creo/src/container.rs"
status = "legacy"
input_spaces = ["root", "psb_section"]
fuzz_targets = ["creo_container", "creo_container_scan"]
charges = []
cost_model = "bounded but uncharged: BTreeSet insert id collection at container.rs:703 capped by the compact_int varint (16383) and by no-progress break; with_capacity(hits.len()) at 332 bounded by scan; no BoundedCount, no work/alloc charge, one audited window egress"
window_egress = ["container.rs:923 (scan_view hands root bytes to the section splitter)"]
ledger_level = 0

