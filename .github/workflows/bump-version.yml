# Manually-run version bump for a cadmpeg release.
#
# The dist release workflow derives its release set by matching the pushed git
# tag against the workspace package version. If a tag is pushed while Cargo.toml
# still holds the previous version, dist fails the `plan` job with "This
# workspace doesn't have anything for dist to Release!". This workflow prepares
# the matching version bump as a reviewable pull request, so the release tag is
# only ever pushed after the manifest already agrees with it.
#
# Flow:
#   1. Run this workflow (Actions tab -> Bump version -> Run workflow) with the
#      target version, e.g. 0.1.4.
#   2. Review and merge the pull request it opens.
#   3. Push the tag to trigger the Release workflow:
#        git switch main && git pull
#        git tag v0.1.4 && git push origin v0.1.4
name: Bump version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target release version, e.g. 0.1.4 (a leading v is stripped)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set workspace version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          current="$(
            cargo metadata --no-deps --format-version 1 |
              jq --raw-output '.packages[] | select(.name == "cadmpeg") | .version'
          )"

          # Refuse a no-op or a downgrade: the new version must sort strictly
          # after the current one.
          lowest="$(printf '%s\n%s\n' "${current}" "${version}" | sort --version-sort | head -n1)"
          if [[ "${version}" == "${current}" || "${lowest}" != "${current}" ]]; then
            echo "requested version ${version} is not greater than current ${current}" >&2
            exit 1
          fi

          python3 scripts/set-workspace-version.py "${version}"
          cargo update --workspace

          # Coherence guard: the manifest version dist matches the tag against
          # must now equal the requested version.
          manifest_version="$(
            cargo metadata --no-deps --format-version 1 |
              jq --raw-output '.packages[] | select(.name == "cadmpeg") | .version'
          )"
          if [[ "${manifest_version}" != "${version}" ]]; then
            echo "manifest version ${manifest_version} does not match requested ${version}" >&2
            exit 1
          fi

      - name: Build with new versions
        run: cargo build --workspace --locked

      - name: Open pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="${{ steps.bump.outputs.version }}"
          branch="release/v${version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -c "${branch}"
          git add Cargo.toml Cargo.lock
          git commit -m "Bump workspace version to ${version}"
          git push --set-upstream origin "${branch}"

          if gh pr view "${branch}" >/dev/null 2>&1; then
            echo "A pull request already exists for ${branch}."
            exit 0
          fi

          body="$(printf '%s\n' \
            "Prepares the workspace for the \`v${version}\` release." \
            "" \
            "- \`[workspace.package]\` version and internal \`[workspace.dependencies]\` requirements set to \`${version}\`" \
            "- \`Cargo.lock\` refreshed for the workspace crates" \
            "" \
            "Generated by the **Bump version** workflow." \
            "" \
            "**After merging**, push the tag to trigger the Release workflow:" \
            '```' \
            "git switch main && git pull" \
            "git tag v${version}" \
            "git push origin v${version}" \
            '```')"

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "Release v${version}: bump workspace version" \
            --body "${body}"
