name: DCO

# The DCO check lives in its own workflow so it can react to `edited`. A
# PR-level sign-off lives in the pull request description, so editing the
# description must re-run the check — and re-running the original CI run does
# not, since a re-run replays the stale event payload. Folding `edited` into
# ci.yml would re-run the whole build/test matrix on every title or
# description edit; here only this cheap checkout-plus-grep re-runs.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

# Supersede an in-flight check when the same PR is updated again in quick
# succession (e.g. fixing a sign-off typo in the description).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CONTRIBUTING.md requires a DCO sign-off on each PR. The sign-off may be
  # per-commit or a single trailer in the PR description.
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check Signed-off-by on the PR or its commits
        # bash for here-string (`<<<`) support; see the SIGPIPE note below.
        shell: bash
        env:
          # Interpolate the SHAs through the environment rather than directly
          # into the script body, so the shell never parses attacker-influenced
          # workflow context.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # The PR description is contributor-authored free text. Like the SHAs,
          # it only ever reaches the shell as an environment value, never
          # interpolated into the script body.
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          # PR-level sign-off. This repo squash-merges with the PR description as
          # the commit message, so a Signed-off-by trailer here lands verbatim on
          # the single commit that reaches main and certifies exactly what merges.
          # When present it satisfies DCO for the whole PR, letting a squash of
          # unsigned WIP commits merge on one sign-off. (Here-string, not a pipe —
          # see the SIGPIPE note below.)
          if grep -q '^Signed-off-by: .\+ <.\+@.\+>' <<<"$PR_BODY"; then
            echo "::notice::PR description carries a Signed-off-by trailer; DCO satisfied at the PR level."
            exit 0
          fi

          # No PR-level sign-off: fall back to requiring one on every authored
          # commit. A commit whose entire diff stays within these paths is release
          # plumbing (version manifest, lockfile, dist config) and certifies
          # nothing that a DCO sign-off is meant to cover, so it is exempt. Any
          # commit that touches a file outside this set must still be signed off.
          exempt='^(Cargo\.toml|Cargo\.lock|dist-workspace\.toml)$'

          # grep reads from here-strings, never a pipe: under `pipefail`, piping
          # into `grep -q` lets grep close the pipe on its first match, the
          # upstream process takes SIGPIPE, and the pipeline reports failure —
          # silently inverting these tests. A here-string has no upstream
          # process, so the pipeline status is grep's alone.
          missing=0
          # --no-merges: merge commits are auto-generated and unsigned; DCO
          # applies to authored commits only.
          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            body="$(git log -1 --format=%B "$sha")"
            if grep -q '^Signed-off-by: .\+ <.\+@.\+>' <<<"$body"; then
              continue
            fi

            # No sign-off. Allowed only if the commit changed at least one file
            # and every changed file is release plumbing. Collect the files that
            # fall OUTSIDE the allowlist; an empty result means all are exempt.
            files="$(git diff-tree --no-commit-id --name-only -r "$sha")"
            nonexempt="$(grep -vE "$exempt" <<<"$files" || true)"
            if [ -n "$files" ] && [ -z "$nonexempt" ]; then
              echo "::notice::Commit $sha has no sign-off but only touches release files; exempt from DCO."
              continue
            fi

            echo "::error::Commit $sha lacks a Signed-off-by trailer (git commit -s)"
            missing=1
          done
          exit $missing
