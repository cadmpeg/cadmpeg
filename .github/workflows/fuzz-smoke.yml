name: Fuzz smoke

on:
  schedule:
    # Nightly at 03:17 UTC (off the hour to avoid the cron rush).
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Compile-only check that the fuzz targets still build on the Rust
  # nightly toolchain. Non-blocking for regular development.
  fuzz-smoke:
    name: fuzz target smoke build (rust nightly)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # `+nightly` overrides the repo's `rust-toolchain.toml` stable pin.
      # cargo-fuzz needs nightly-only flags (`-Zsanitizer=address`, sancov
      # coverage), and the proxy propagates `RUSTUP_TOOLCHAIN` to the inner
      # `cargo build` it spawns.
      - name: Build fuzz targets (no run)
        run: cargo +nightly fuzz build --fuzz-dir crates/cadmpeg-fuzz

      - name: Run each fuzz target briefly
        run: |
          for t in $(cargo +nightly fuzz list --fuzz-dir crates/cadmpeg-fuzz); do
            seed_dir="crates/cadmpeg-fuzz/seeds/$t"
            if [ -d "$seed_dir" ]; then
              cargo +nightly fuzz run "$t" "$seed_dir" --fuzz-dir crates/cadmpeg-fuzz -- -max_total_time=60
            else
              cargo +nightly fuzz run "$t" --fuzz-dir crates/cadmpeg-fuzz -- -max_total_time=60
            fi
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts
          path: crates/cadmpeg-fuzz/artifacts/
