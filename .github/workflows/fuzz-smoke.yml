name: Fuzz

on:
  pull_request:
  schedule:
    # Nightly at 03:17 UTC (off the hour to avoid the cron rush).
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Per-target wall time for a smoke/nightly run. Short enough for a PR gate,
  # long enough to reach format-gated decode paths from the seed corpus.
  FUZZ_TIME: "60"

jobs:
  # Runs the fuzz targets whose codec changed and every target when
  # `cadmpeg-ir` or another shared platform crate changes.
  # Blocking: a crash on committed seeds fails the PR instead of surfacing on
  # the next non-gating nightly cron.
  fuzz-pr:
    name: fuzz smoke (changed targets)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so the base..head diff can classify changed crates.
          fetch-depth: 0

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # A codec change runs that codec's targets; a change to `cadmpeg-ir`,
      # the fuzz harness, or the workspace manifests fans out to every target,
      # because the platform sits under every codec's decode path.
      - name: Select fuzz targets from the diff
        id: select
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          changed=$(git diff --name-only "$base"...HEAD)
          echo "changed files:"; echo "$changed"

          all=$(cargo +nightly fuzz list --fuzz-dir crates/cadmpeg-fuzz)

          fanout=0
          declare -A prefixes=()
          while IFS= read -r f; do
            case "$f" in
              crates/cadmpeg-ir/*|crates/cadmpeg-fuzz/*|Cargo.toml|Cargo.lock|.github/workflows/fuzz-smoke.yml)
                fanout=1 ;;
              crates/cadmpeg-codec-catia/*)  prefixes[catia_]=1 ;;
              crates/cadmpeg-codec-creo/*)   prefixes[creo_]=1 ;;
              crates/cadmpeg-codec-f3d/*)    prefixes[f3d_]=1 ;;
              crates/cadmpeg-codec-nx/*)     prefixes[nx_]=1 ;;
              crates/cadmpeg-codec-rhino/*)  prefixes[rhino_]=1 ;;
              crates/cadmpeg-codec-sldprt/*) prefixes[sldprt_]=1 ;;
              crates/cadmpeg-step/*)         prefixes[step_]=1 ;;
            esac
          done <<< "$changed"

          if [ "$fanout" -eq 1 ]; then
            targets="$all"
          else
            targets=""
            for t in $all; do
              for p in "${!prefixes[@]}"; do
                case "$t" in "$p"*) targets="$targets $t" ;; esac
              done
            done
          fi
          targets=$(echo "$targets" | tr ' ' '\n' | sed '/^$/d' | sort -u)
          echo "selected targets:"; echo "$targets"
          {
            echo "targets<<EOF"
            echo "$targets"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build fuzz targets (no run)
        if: steps.select.outputs.targets != ''
        run: cargo +nightly fuzz build --fuzz-dir crates/cadmpeg-fuzz

      - name: Run selected targets against committed seeds
        if: steps.select.outputs.targets != ''
        run: |
          echo "${{ steps.select.outputs.targets }}" | \
            ./crates/cadmpeg-fuzz/run-targets.sh

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-pr
          path: crates/cadmpeg-fuzz/artifacts/

  # Nightly smoke over every target, seeded from the committed corpus and
  # dictionaries so magic-gated container/leaf targets reach real decode paths
  # instead of failing the format preamble from an empty corpus.
  fuzz-nightly:
    name: fuzz smoke (all targets, nightly)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # `+nightly` overrides the repo's `rust-toolchain.toml` stable pin.
      # cargo-fuzz needs nightly-only flags (`-Zsanitizer=address`, sancov
      # coverage), and the proxy propagates `RUSTUP_TOOLCHAIN` to the inner
      # `cargo build` it spawns.
      - name: Build fuzz targets (no run)
        run: cargo +nightly fuzz build --fuzz-dir crates/cadmpeg-fuzz

      - name: Run every target against committed seeds
        run: |
          cargo +nightly fuzz list --fuzz-dir crates/cadmpeg-fuzz | \
            ./crates/cadmpeg-fuzz/run-targets.sh

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-nightly
          path: crates/cadmpeg-fuzz/artifacts/
