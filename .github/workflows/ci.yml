name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Supersede in-flight runs when the same ref is pushed again; PR iteration
# otherwise runs stale and current pipelines to completion side by side.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Throwaway runners get nothing from incremental compilation or debuginfo;
  # both slow the build (debuginfo dominates MSVC link time in particular)
  # and inflate the cargo cache.
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  # Core gate: everything here must pass on stable.
  check:
    name: build / test / fmt / clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        # -W missing-docs keeps the documentation debt visible without
        # blocking; drop it once the workspace is fully documented.
        run: cargo clippy --workspace -- -D warnings -W missing-docs

      - name: Test
        # Builds the full workspace (libs, bins, test harnesses) before
        # running, so a separate `cargo build` step would be redundant.
        run: cargo test --workspace

  # Verifies the declared MSRV floor (Cargo.toml rust-version). RUSTUP_TOOLCHAIN
  # overrides the repo's rust-toolchain.toml pin so the floor is actually tested.
  msrv:
    name: MSRV check (1.88)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: "1.88"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

  # CONTRIBUTING.md requires a DCO sign-off on every commit; this enforces it
  # for pull requests.
  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check Signed-off-by on every PR commit
        # bash for here-string (`<<<`) support; see the SIGPIPE note below.
        shell: bash
        env:
          # Interpolate the SHAs through the environment rather than directly
          # into the script body, so the shell never parses attacker-influenced
          # workflow context.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # A commit whose entire diff stays within these paths is release
          # plumbing (version manifest, lockfile, dist config) and certifies
          # nothing that a DCO sign-off is meant to cover, so it is exempt. Any
          # commit that touches a file outside this set must still be signed off.
          exempt='^(Cargo\.toml|Cargo\.lock|dist-workspace\.toml)$'

          # grep reads from here-strings, never a pipe: under `pipefail`, piping
          # into `grep -q` lets grep close the pipe on its first match, the
          # upstream process takes SIGPIPE, and the pipeline reports failure —
          # silently inverting these tests. A here-string has no upstream
          # process, so the pipeline status is grep's alone.
          missing=0
          # --no-merges: merge commits are auto-generated and unsigned; DCO
          # applies to authored commits only.
          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            body="$(git log -1 --format=%B "$sha")"
            if grep -q '^Signed-off-by: .\+ <.\+@.\+>' <<<"$body"; then
              continue
            fi

            # No sign-off. Allowed only if the commit changed at least one file
            # and every changed file is release plumbing. Collect the files that
            # fall OUTSIDE the allowlist; an empty result means all are exempt.
            files="$(git diff-tree --no-commit-id --name-only -r "$sha")"
            nonexempt="$(grep -vE "$exempt" <<<"$files" || true)"
            if [ -n "$files" ] && [ -z "$nonexempt" ]; then
              echo "::notice::Commit $sha has no sign-off but only touches release files; exempt from DCO."
              continue
            fi

            echo "::error::Commit $sha lacks a Signed-off-by trailer (git commit -s)"
            missing=1
          done
          exit $missing

  # Byte-level codecs are the code most likely to break across platforms.
  cross-platform:
    name: build / test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

  # RustSec advisory scan of the dependency tree.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cargo-audit
        # Prebuilt binary; rustsec/audit-check compiled cargo-audit from
        # source on every run and dominated the pipeline's wall-clock.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit
