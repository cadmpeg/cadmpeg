name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Core gate: everything here must pass on stable.
  check:
    name: build / test / fmt / clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        # -W missing-docs keeps the documentation debt visible without
        # blocking; drop it once the workspace is fully documented.
        run: cargo clippy --workspace -- -D warnings -W missing-docs

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace
