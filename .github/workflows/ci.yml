name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Supersede in-flight runs when the same ref is pushed again; PR iteration
# otherwise runs stale and current pipelines to completion side by side.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Throwaway runners get nothing from incremental compilation or debuginfo;
  # both slow the build (debuginfo dominates MSVC link time in particular)
  # and inflate the cargo cache.
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  # Core gate: everything here must pass on stable.
  check:
    name: build / test / fmt / clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        # -W missing-docs keeps the documentation debt visible without
        # blocking; drop it once the workspace is fully documented.
        run: cargo clippy --workspace -- -D warnings -W missing-docs

      - name: Unit and integration tests
        # Builds the full workspace (libs, bins, test harnesses) before
        # running, so a separate `cargo build` step would be redundant.
        run: cargo test-fast

      - name: Documentation tests
        run: cargo test --workspace --doc

      - name: Fuzz targets compile
        # The fuzz crate declares its own `[workspace]`, so every step above
        # skips it; a refactor that moves a codec's internals silently rots the
        # harnesses' imports. A stable `check` catches that drift without the
        # nightly toolchain `cargo fuzz build` needs.
        run: cargo check --manifest-path crates/cadmpeg-fuzz/Cargo.toml

  # Verifies the declared MSRV floor (Cargo.toml rust-version). RUSTUP_TOOLCHAIN
  # overrides the repo's rust-toolchain.toml pin so the floor is actually tested.
  msrv:
    name: MSRV check (1.88)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: "1.88"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

  # Byte-level codecs are the code most likely to break across platforms.
  cross-platform:
    name: build / test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Unit and integration tests
        run: cargo test-fast

  # RustSec advisory scan of the dependency tree.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cargo-audit
        # Prebuilt binary; rustsec/audit-check compiled cargo-audit from
        # source on every run and dominated the pipeline's wall-clock.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit
